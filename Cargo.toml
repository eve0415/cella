[workspace]
resolver = "2"
members = [
    "crates/cella-cli",
    "crates/cella-codegen",
    "crates/cella-config",
    "crates/cella-credential-proxy",
    "crates/cella-docker",
    "crates/cella-env",
    "crates/cella-git",
    "crates/cella-port",
    "crates/cella-agent",
    "crates/cella-features",
    "crates/cella-tunnel",
    "crates/cella-tunnel-server",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"
repository = "https://github.com/eve0415/cella"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.50.0", features = ["full"] }

# Serialization
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"

# Encoding
base64 = "0.22.1"

# Error handling
thiserror = "2.0.18"

# Logging
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

# CLI
clap = { version = "4.6.0", features = ["derive"] }

# Diagnostics
miette = { version = "7", features = ["fancy"] }

# Docker client
bollard = "0.18.1"

# Hashing
sha2 = "0.10.8"
hex = "0.4.3"

# Stream processing
futures-util = "0.3.31"

# Terminal
crossterm = "0.28.1"

# Timestamps
chrono = "0.4.40"

# Tar archives
tar = "0.4.43"

# Testing
tempfile = "3.15.0"

# Internal crates
cella-agent = { path = "crates/cella-agent" }
cella-codegen = { path = "crates/cella-codegen" }
cella-config = { path = "crates/cella-config" }
cella-credential-proxy = { path = "crates/cella-credential-proxy" }
cella-docker = { path = "crates/cella-docker" }
cella-env = { path = "crates/cella-env" }
cella-features = { path = "crates/cella-features" }
cella-git = { path = "crates/cella-git" }
cella-port = { path = "crates/cella-port" }
cella-tunnel = { path = "crates/cella-tunnel" }

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
# Allow common patterns that pedantic flags unnecessarily
module_name_repetitions = "allow"
must_use_candidate = "allow"
# Stubs are async by design — they'll gain real awaits during implementation
unused_async = "allow"

[workspace.lints.rust]
unsafe_code = "deny"
