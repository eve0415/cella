[workspace]
resolver = "2"
members = [
    "crates/cella-cli",
    "crates/cella-config",
    "crates/cella-docker",
    "crates/cella-git",
    "crates/cella-port",
    "crates/cella-agent",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"
repository = "https://github.com/eve0415/cella"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
thiserror = "2"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Internal crates
cella-config = { path = "crates/cella-config" }
cella-docker = { path = "crates/cella-docker" }
cella-git = { path = "crates/cella-git" }
cella-port = { path = "crates/cella-port" }
cella-agent = { path = "crates/cella-agent" }

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
# Allow common patterns that pedantic flags unnecessarily
module_name_repetitions = "allow"
must_use_candidate = "allow"
# Stubs are async by design — they'll gain real awaits during implementation
unused_async = "allow"

[workspace.lints.rust]
unsafe_code = "deny"
