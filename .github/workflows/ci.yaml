name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings -D clippy::all

  test:
    name: Test
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Run tests
        run: cargo test --workspace

  insta:
    name: Snapshots
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Install cargo-insta
        uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2.69.6
        with:
          tool: cargo-insta

      - name: Validate snapshots
        run: cargo insta test --workspace --check --unreferenced=reject

  integration-test:
    name: Integration Test
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read
      pull-requests: write
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2.69.6
        with:
          tool: cargo-llvm-cov

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Run unit tests with coverage
        run: cargo llvm-cov --no-report --workspace

      - name: Run integration tests with coverage
        run: >
          cargo llvm-cov --no-report
          -p cella-features
          -p cella-daemon
          -p cella-compose
          --features integration-tests

      - name: Generate combined coverage report
        run: cargo llvm-cov report > coverage-report.txt

      - name: Generate per-crate coverage summary
        run: |
          echo "## Per-Crate Coverage" > per-crate-coverage.txt
          echo "" >> per-crate-coverage.txt
          for crate in cella-protocol cella-backend cella-port cella-network cella-codegen cella-config cella-compose cella-git cella-env cella-features cella-agent cella-daemon cella-orchestrator cella-doctor cella-docker cella-cli cella-container; do
            line_cov=$(cargo llvm-cov report -p "$crate" 2>/dev/null | grep "^TOTAL" | awk '{print $NF}')
            if [ -n "$line_cov" ]; then
              printf "%-25s %s\n" "$crate" "$line_cov" >> per-crate-coverage.txt
            fi
          done

      - name: Build coverage comment
        if: github.event_name == 'pull_request'
        id: coverage
        run: |
          {
            echo 'comment<<EOF'
            echo '## Coverage Report'
            echo ''
            echo '### Workspace Total'
            echo '```'
            grep -E '^(Filename|-|TOTAL)' coverage-report.txt
            echo '```'
            echo ''
            echo '### Per-Crate Breakdown'
            echo '```'
            cat per-crate-coverage.txt
            echo '```'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: coverage
          message: ${{ steps.coverage.outputs.comment }}

  macos-integration-test:
    name: Integration Test (macOS)
    runs-on: macos-26
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Install Apple Container CLI
        run: |
          curl -fsSL -o container.pkg \
            https://github.com/apple/container/releases/download/0.10.0/container-0.10.0-installer-signed.pkg
          sudo installer -pkg container.pkg -target /
          rm container.pkg

      - name: Start container service
        run: yes | container system start

      - name: Verify container CLI
        run: container version

      - name: Pull test image
        run: container image pull alpine:3.21

      - name: Run Apple Container integration tests
        run: cargo test -p cella-container --features integration-tests

  cross-compile:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-26-intel

          - target: aarch64-apple-darwin
            runner: macos-26

          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          target: ${{ matrix.target }}

      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build agent
        if: contains(matrix.target, 'linux')
        run: cargo build --package cella-agent --target ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --package cella-cli --target ${{ matrix.target }}
