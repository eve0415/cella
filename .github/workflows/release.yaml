name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract and validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  build-agent:
    name: Agent (${{ matrix.arch }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
            runner: ubuntu-24.04

          - target: aarch64-unknown-linux-musl
            arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          target: ${{ matrix.target }}

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build agent
        run: cargo build --package cella-agent --target ${{ matrix.target }} --release

      - name: Prepare agent binary
        run: cp "target/${{ matrix.target }}/release/cella-agent" "cella-agent-${{ matrix.arch }}"

      - name: Generate SBOM
        run: |
          cargo install cargo-sbom --version 0.10.0
          cargo sbom --cargo-package cella-agent --output-format spdx_json_2_3 > cella-agent-${{ matrix.arch }}.sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: cella-agent-${{ matrix.arch }}

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: cella-agent-${{ matrix.arch }}
          sbom-path: cella-agent-${{ matrix.arch }}.sbom.spdx.json

      - name: Upload agent binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cella-agent-${{ matrix.arch }}
          path: cella-agent-${{ matrix.arch }}
          if-no-files-found: error

  build-cli:
    name: CLI (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-26-intel

          - target: aarch64-apple-darwin
            runner: macos-26

          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          target: ${{ matrix.target }}

      - name: Install musl-tools
        if: contains(matrix.target, 'linux')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build CLI
        run: cargo build --package cella-cli --target ${{ matrix.target }} --release

      - name: Package archive
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          TARGET="${{ matrix.target }}"
          STAGING="staging"
          mkdir -p "$STAGING"
          cp "target/${TARGET}/release/cella" "$STAGING/"
          tar czf "cella-v${VERSION}-${TARGET}.tar.gz" -C "$STAGING" .

      - name: Generate SBOM
        run: |
          cargo install cargo-sbom --version 0.10.0
          cargo sbom --cargo-package cella-cli --output-format spdx_json_2_3 > cella-cli.sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: cella-v${{ needs.validate.outputs.version }}-${{ matrix.target }}.tar.gz

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: cella-v${{ needs.validate.outputs.version }}-${{ matrix.target }}.tar.gz
          sbom-path: cella-cli.sbom.spdx.json

      - name: Upload archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cella-v${{ needs.validate.outputs.version }}-${{ matrix.target }}
          path: cella-v${{ needs.validate.outputs.version }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Release
    needs:
      - validate
      - build-agent
      - build-cli
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          mkdir -p release

          # Move CLI archives
          for dir in artifacts/cella-v${VERSION}-*; do
            cp "$dir"/*.tar.gz release/
          done

          # Move agent binaries (already renamed to cella-agent-{arch} during build)
          cp artifacts/cella-agent-x86_64/cella-agent-x86_64 release/cella-agent-x86_64
          cp artifacts/cella-agent-aarch64/cella-agent-aarch64 release/cella-agent-aarch64

          # Generate checksums
          cd release
          sha256sum cella-v*.tar.gz cella-agent-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            release/*

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cd release

          SHA_MACOS_ARM=$(sha256sum "cella-v${VERSION}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_MACOS_INTEL=$(sha256sum "cella-v${VERSION}-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_ARM=$(sha256sum "cella-v${VERSION}-aarch64-unknown-linux-musl.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_INTEL=$(sha256sum "cella-v${VERSION}-x86_64-unknown-linux-musl.tar.gz" | cut -d' ' -f1)

          cd ..
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/eve0415/homebrew-tap.git" tap

          mkdir -p tap/Formula
          sed -e "s/VERSION/${VERSION}/g" \
              -e "s/SHA256_MACOS_ARM/${SHA_MACOS_ARM}/g" \
              -e "s/SHA256_MACOS_INTEL/${SHA_MACOS_INTEL}/g" \
              -e "s/SHA256_LINUX_ARM/${SHA_LINUX_ARM}/g" \
              -e "s/SHA256_LINUX_INTEL/${SHA_LINUX_INTEL}/g" \
              .github/formula/cella.rb.tmpl > tap/Formula/cella.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cella.rb
          git commit -m "cella ${VERSION}"
          git push
